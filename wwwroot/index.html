<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist Triage Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; padding: 2rem; display: flex; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1, h2 { color: #2563eb; margin-top: 0; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; margin-top: 30px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; font-weight: bold; color: white; margin-top: 10px; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-secondary { background-color: #4b5563; }
        .btn-secondary:hover { background-color: #374151; }
        .btn-danger { background-color: #dc2626; }
        .btn-danger:hover { background-color: #b91c1c; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        #result { margin-top: 20px; padding: 15px; background: #1e293b; color: #a5b4fc; border-radius: 5px; display: none; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; overflow-x: auto; }
        .loading { text-align: center; display: none; margin-top: 15px; font-style: italic; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>MediAssist AI Triage</h1>
    
    <form id="triageForm">
        <label>Patient Name</label>
        <input type="text" id="name" value="John Doe" required>

        <label>Age</label>
        <input type="number" id="age" value="35" required>

        <label>Gender</label>
        <select id="gender">
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="Other">Other</option>
        </select>

        <label>Symptoms (comma separated)</label>
        <input type="text" id="symptoms" value="mild headache, runny nose, slight cough" required>

        <label>Medical History Notes</label>
        <textarea id="history" rows="2">None</textarea>

        <button type="submit" class="btn-primary">Analyze Symptoms</button>
    </form>

    <h2>Manage Existing Patient</h2>
    <label>Patient ID</label>
    <input type="text" id="lookupId" placeholder="Paste patient_id here...">
    
    <div class="button-group">
        <button type="button" id="btnGetReport" class="btn-secondary">Get Report (GET)</button>
        <button type="button" id="btnEscalate" class="btn-danger">Escalate (POST)</button>
    </div>

    <div class="loading" id="loading">Processing request...</div>
    <div id="result"></div>
</div>

<script>
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    function showLoading() {
        loading.style.display = 'block';
        resultDiv.style.display = 'none';
    }

    function displayResult(data) {
        resultDiv.style.display = 'block';
        resultDiv.textContent = JSON.stringify(data, null, 2);
        loading.style.display = 'none';
        
        // Auto-fill the Patient ID box if a new triage was just created
        if (data.patient_id) {
            document.getElementById('lookupId').value = data.patient_id;
        }
    }

    // 1. Submit New Triage (POST /triage)
    document.getElementById('triageForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        showLoading();

        const payload = {
            patient_name: document.getElementById('name').value,
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            symptoms: document.getElementById('symptoms').value.split(',').map(s => s.trim()),
            medical_history_notes: document.getElementById('history').value
        };

        try {
            const response = await fetch('/triage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            displayResult(await response.json());
        } catch (error) {
            displayResult({ error: "API connection failed." });
        }
    });

    // 2. Retrieve Report (GET /report/{id})
    document.getElementById('btnGetReport').addEventListener('click', async () => {
        const id = document.getElementById('lookupId').value.trim();
        if (!id) return alert("Please enter a Patient ID first.");
        
        showLoading();
        try {
            const response = await fetch(`/report/${id}`);
            displayResult(await response.json());
        } catch (error) {
            displayResult({ error: "Failed to fetch report." });
        }
    });

    // 3. Escalate Patient (POST /escalate/{id})
    document.getElementById('btnEscalate').addEventListener('click', async () => {
        const id = document.getElementById('lookupId').value.trim();
        if (!id) return alert("Please enter a Patient ID first.");
        
        showLoading();
        try {
            const response = await fetch(`/escalate/${id}`, { method: 'POST' });
            displayResult(await response.json());
        } catch (error) {
            displayResult({ error: "Failed to escalate patient." });
        }
    });
</script>

</body>
</html>
